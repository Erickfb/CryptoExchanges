name: CryptoExchanges
options:
  bundleIdPrefix: com.cryptoexchanges
  deploymentTarget:
    iOS: "15.0"

targets:
  CryptoExchanges:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - Sources/Resources/*.json
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchStoryboardName: ""
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cryptoexchanges.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Sources/App/Info.plist
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "15.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"

  CryptoExchangesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/UnitTests
    resources:
      - Tests/Resources/*.json
    dependencies:
      - target: CryptoExchanges
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cryptoexchanges.tests
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "15.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES

  CryptoExchangesUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - Tests/UITests
    dependencies:
      - target: CryptoExchanges
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cryptoexchanges.uitests
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "15.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  CryptoExchanges:
    build:
      targets:
        CryptoExchanges: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CryptoExchangesTests
        - CryptoExchangesUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
